spring.application.name=demo

# MariaDB Connection for Test DB
spring.datasource.url=jdbc:mariadb://localhost:3306/test_db?createDatabaseIfNotExist=true
#spring.datasource.url=jdbc:mariadb://localhost:3306/test_db?createDatabaseIfNotExist=true&rewriteBatchedStatements=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=60000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Flyway Configuration
spring.flyway.enabled=true
# Ensures Flyway picks up your callback scripts
spring.flyway.locations=classpath:db/migration,classpath:db/callbacks

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-versiom=0
spring.flyway.validate-on-migrate=false
spring.flyway.table=flyway_schema_history_demo_service