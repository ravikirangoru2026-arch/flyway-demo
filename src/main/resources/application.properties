spring.application.name=demo

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/test_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MARIADB_PWD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ─── Connection Pool (HikariCP) ───────────────────────────────────────────────
spring.datasource.hikari.pool-name=HikariPool-Employee
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
# Ensures Flyway picks up your callback scripts
spring.flyway.locations=classpath:db/migration,classpath:db/callbacks
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-versiom=0
spring.flyway.validate-on-migrate=false
spring.flyway.table=flyway_schema_history_demo_service

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.yourcompany=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.flywaydb=INFO

# ─── SpringDoc / Swagger ─── http://localhost:8080/swagger-ui/index.html
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# Packages to scan — point to your controller package
springdoc.packages-to-scan=com.rk.batch.demo.controller

# ──────── Spring security ─────────────────────────────────────────────────────
# Default credentials for local testing
spring.security.user.name=admin
spring.security.user.password=${SECURITY_PWD}

